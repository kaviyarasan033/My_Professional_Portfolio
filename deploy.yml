name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm install

    - name: Run build
      run: npm run build

    - name: Deploy
      run: npm run deploy