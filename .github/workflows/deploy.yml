name: Deploy Portfolio to FTP

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        env:
          LIGHTNINGCSS_USE_WASM: "true"
        run: npm install

      - name: Inject Firebase Secrets
        run: |
          sed -i "s/FIREBASE_API_KEY_PLACEHOLDER/${{ secrets.FIREBASE_API_KEY }}/g" src/app/firebase.service.ts public/firebase-messaging-sw.js
          sed -i "s/FIREBASE_AUTH_DOMAIN_PLACEHOLDER/${{ secrets.FIREBASE_AUTH_DOMAIN }}/g" src/app/firebase.service.ts public/firebase-messaging-sw.js
          sed -i "s/FIREBASE_PROJECT_ID_PLACEHOLDER/${{ secrets.FIREBASE_PROJECT_ID }}/g" src/app/firebase.service.ts public/firebase-messaging-sw.js
          sed -i "s/FIREBASE_STORAGE_BUCKET_PLACEHOLDER/${{ secrets.FIREBASE_STORAGE_BUCKET }}/g" src/app/firebase.service.ts public/firebase-messaging-sw.js
          sed -i "s/FIREBASE_MESSAGING_SENDER_PLACEHOLDER/${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}/g" src/app/firebase.service.ts public/firebase-messaging-sw.js
          sed -i "s/FIREBASE_APP_ID_PLACEHOLDER/${{ secrets.FIREBASE_APP_ID }}/g" src/app/firebase.service.ts public/firebase-messaging-sw.js
          sed -i "s/FIREBASE_MEASUREMENT_ID_PLACEHOLDER/${{ secrets.FIREBASE_MEASUREMENT_ID }}/g" src/app/firebase.service.ts public/firebase-messaging-sw.js
          sed -i "s/FIREBASE_VAPID_KEY_PLACEHOLDER/${{ secrets.FIREBASE_VAPID_KEY }}/g" src/app/firebase.service.ts

      - name: Build Angular App
        env:
          LIGHTNINGCSS_USE_WASM: "true"
        run: npm run build

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: dist/
          server-dir: /
